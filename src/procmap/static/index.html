<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>procmap | Processes graph</title>
    <style>
      html, body { height: 100%; margin: 0; font-family: 'Ubuntu', 'Segoe UI', 'Arial'; }
      button { font-family: 'Ubuntu', 'Segoe UI', 'Arial'; }
      #controls { position: absolute; top: 8px; left: 8px; z-index: 10; background: rgba(255,255,255,0.9); border-radius: 6px; padding: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.12); }
      #graph { width: 100%; height: 100%; }
      #details { position: absolute; right: 8px; top: 8px; z-index: 10; width: 320px; max-height: 60vh; overflow:auto; background: rgba(255,255,255,0.95); border-radius: 6px; padding: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.12); }
      .muted { color: #666; }
      button { padding: 6px 10px; border-radius: 4px; border: 1px solid #ccc; background: #f5f5f5; cursor: pointer }
      .control-slider-container { display:flex; align-items:center; margin-bottom:2px }
      .control-slider-label { width:48px; text-align:right; margin-left:8px;}
      hr { border: none; border-top: 1px solid rgba(0,0,0,0.08); margin: 6px 0; }
    </style>
  </head>
  <body>
    <div id="controls">
      <div style="margin-top:6px; font-size:12px;">
        <button id="refreshBtn">Refresh</button>
        <button id="unlockBtn" style="margin-left:8px">Unlock nodes</button>
        <label style="margin-left:8px"><input type="checkbox" checked id="showIsolated" /> Show isolated nodes</label>
        <div class="muted" style="margin-top:6px">TIP: Drag nodes to position (locked nodes outlined in <b>black</b>); <strong>Shift+click</strong> to release a fixed node.</div>

        <hr />
        <!-- Simulation sliders -->
        <div>
          <div class="control-slider-container">
            <label style="width:110px">charge</label>
            <input id="chargeRange" type="range" min="-800" max="-50" value="-450" step="10" style="flex:1" />
            <span id="chargeVal" class="control-slider-label">-450</span>
          </div>

          <div class="control-slider-container">
            <label style="width:110px">link dist</label>
            <input id="linkDistRange" type="range" min="40" max="300" value="140" step="5" style="flex:1" />
            <span id="linkDistVal" class="control-slider-label">140</span>
          </div>

          <div class="control-slider-container">
            <label style="width:110px">link strength</label>
            <input id="linkStrengthRange" type="range" min="0" max="1" value="0.8" step="0.01" style="flex:1" />
            <span id="linkStrVal" class="control-slider-label">0.80</span>
          </div>

          <div class="control-slider-container">
            <label style="width:110px">collision ×</label>
            <input id="collisionMulRange" type="range" min="0.5" max="2" value="1" step="0.05" style="flex:1" />
            <span id="collMulVal" class="control-slider-label">1.00</span>
          </div>

          <div class="control-slider-container">
            <label style="width:110px">alpha target</label>
            <input id="alphaTargetRange" type="range" min="0" max="0.5" value="0" step="0.01" style="flex:1" />
            <span id="alphaTVal" class="control-slider-label">0.00</span>
          </div>

          <div class="control-slider-container">
            <label style="width:110px">velocityDecay</label>
            <input id="velDecayRange" type="range" min="0.01" max="0.99" value="0.99" step="0.01" style="flex:1" />
            <span id="velDecayVal" class="control-slider-label">0.80</span>
          </div>

          <hr />

          <div class="control-slider-container">
            <label style="width:110px">links opacity</label>
            <input id="linkOpacityRange" type="range" min="0.01" max="0.99" value="0.50" step="0.01" style="flex:1" />
            <span id="linkOpacityVal" style="width:48px;text-align:right;margin-left:8px">0.50</span>
          </div>
        </div>
      </div>
    </div>

    <div id="details" hidden>
      <div id="detailsContent"></div>
    </div>

    <div id="graph"></div>

    <!-- d3 included for convenience; force-graph works with these builds -->
    <script src="https://d3js.org/d3.v6.min.js"></script>
    <script src="https://unpkg.com/force-graph/dist/force-graph.min.js"></script>

    <script>
      // Utilities
      const q = sel => document.querySelector(sel);

      const NODE_TYPE_COLORS = {
          'process': '#2171ad',  // blue
          'socket': '#e35f44',  // red
        };

      const EDGE_TYPE_COLORS = {
        'unix_domain_socket': '#1f78b4', // blue
        'pipe': '#9e1dde',  // magenta
        'socket_connection': '#e35f44',  // red
      };

      // global settings (mutable by UI)
      settings = {
        linkOpacity: 0.8,
      };

      function nodeColorFor(node) {
          const type = node.type;
          return NODE_TYPE_COLORS[type] || '#999';
        }

      function edgeColorFor(edge) {
        const type = edge.type;
        return EDGE_TYPE_COLORS[type] || '#999';
      }

      async function loadData() {
        // Fetch generic graph from server
        const res = await fetch('/api/graph');
        if (!res.ok) throw new Error('Failed to fetch /api/graph: ' + res.status);
        const graph = await res.json();

        // Server format: { nodes: [{id, type, properties}], edges: [{source_id, target_id, type, properties}] }
        const nodes = (graph.nodes || []).map(n => ({ id: n.id, type: n.type, properties: n.properties || {}, val: 1 }));
        const links = (graph.edges || []).map(e => ({ source: e.source_id, target: e.target_id, type: e.type, properties: e.properties || {} }));

        return { nodes, links };
      }

      // Create ForceGraph instance
      const Graph = ForceGraph()
        (document.getElementById('graph'))
          .nodeId('id')
          .graphData({ nodes: [], links: [] })
          .nodeLabel(n => {
            const name = n.properties && (n.properties.name || n.properties.label);
            const label = name ? name : (n.type ? `${n.type} ${n.id}` : n.id);
            return label + (n.type ? `\n(${n.type})` : '');
          })
          .linkColor(l => {
            const base = edgeColorFor(l);
            const col = d3.color(base);
            col.opacity = settings.linkOpacity;
            return col.toString();
          })
          .linkLabel(l => l.type)
          .linkDirectionalParticleColor(l => {
            const base = edgeColorFor(l);
            const col = d3.color(base);
            col.opacity = settings.linkOpacity;
            return col.toString();
          })
          .linkDirectionalParticles(0)
          .linkDirectionalArrowLength(link => {
            if (link.properties && link.properties.directional === false) {
              return 0;
            }
            return 6;
          })
          .linkLineDash(link => {
            if (link.properties && link.properties.dashed === true) {
              return [4,4];
            }
            return null;
          })
          .nodeRelSize(6)
          // custom canvas drawing: keep node size constant on zoom and draw labels scaled nicely
          .nodeCanvasObject((node, ctx, globalScale) => {
            const baseSize = Math.max(4, (node.val || 1) * 3);
            const r = Math.max(3, baseSize / globalScale); // keep circle size roughly constant on screen

            // draw filled circle
            ctx.beginPath();
            ctx.fillStyle = nodeColorFor(node);
            ctx.arc(node.x, node.y, r, 0, 2 * Math.PI, false);
            ctx.fill();

            // draw red outline for locked (pinned) nodes
            const locked = (node.fx !== undefined || node.fy !== undefined);
            if (locked) {
              // stroke width should scale inversely with zoom so it remains visible
              const strokeWidth = Math.max(1.2, 2 / globalScale);
              ctx.save();
              ctx.lineWidth = strokeWidth;
              ctx.strokeStyle = 'rgba(0,0,0,0.95)';
              ctx.beginPath();
              ctx.arc(node.x, node.y, r + strokeWidth / 2, 0, 2 * Math.PI, false);
              ctx.stroke();
              ctx.restore();
            }

            // generic label (use properties.name/label if available, otherwise type + id)
            const name = node.properties && (node.properties.name || node.properties.label);
            const label = name ? name : (node.type ? `${node.type} ${node.id}` : node.id);
            const fontSize = Math.max(3, 12 / globalScale);
            ctx.font = `${fontSize}px Ubuntu, sans-serif`;
            ctx.fillStyle = 'rgba(0,0,0,0.75)';
            ctx.fillText(label, node.x + r + 4, node.y + fontSize / 2.8);
          })
          // pointer area for interactions (keeps it reasonably large for hit testing)
          .nodePointerAreaPaint((node, color, ctx) => {
            const r = Math.max(8, (node.val || 1) * 3);
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(node.x, node.y, r, 0, 2 * Math.PI, false);
            ctx.fill();
          })
          .onNodeClick((node, event) => {
            // Shift/Alt+click to release fixed position, otherwise show details
            if (event && (event.shiftKey || event.altKey)) {
              node.fx = undefined;
              node.fy = undefined;
            } else {
              showDetails(node);
            }
          })
          .onNodeDrag(node => {
            // keep node pinned while dragging
            node.fx = node.x;
            node.fy = node.y;
          })
          .onNodeDragEnd(node => {
            // fix node in place after drag
            node.fx = node.x;
            node.fy = node.y;
          })
          .onBackgroundClick(() => hideDetails())
          // tune d3 forces to reduce overlaps
          .d3Force('charge', d3.forceManyBody().strength(-450))
          .d3Force('link', d3.forceLink().distance(140).strength(0.8))
          .d3Force('collision', d3.forceCollide().radius(d => 18 + (d.val || 1) * 6).strength(1).iterations(4));

      // keep center updated on resize
      window.addEventListener('resize', () => {
        Graph.d3Force('center', d3.forceCenter(window.innerWidth / 2, window.innerHeight / 2));
      });

      // Overlay that shows live d3 simulation parameters (bottom-right)
      (function addSimOverlay() {
        const overlay = document.createElement('div');
        overlay.id = 'simOverlay';
        Object.assign(overlay.style, {
          position: 'fixed',
          right: '10px',
          bottom: '10px',
          background: 'rgba(255,255,255,0.70)',
          border: '1px solid rgba(0,0,0,0.10)',
          color: 'rgba(0,0,0,0.80)',
          padding: '8px 10px',
          borderRadius: '3px',
          fontFamily: '"Ubuntu Mono", monospace',
          fontSize: '12px',
          lineHeight: '1.25',
          zIndex: 9999,
          pointerEvents: 'none',
          minWidth: '160px',
          opacity: '0.95'
        });

        document.body.appendChild(overlay);

        function fmtNum(v, digits = 3) {
          return (typeof v === 'number' && isFinite(v)) ? Number(v).toFixed(digits) : String(v);
        }

        function safeCall(fn, sampleArg) {
          try {
            const res = fn();
            if (typeof res === 'function') {
              // If a function, try to call it with a sample to get representative value
              try { return fn(sampleArg !== undefined ? sampleArg : { val: 1 }); } catch(e) { return 'fn'; }
            }
            return res;
          } catch (e) {
            return '-';
          }
        }

        function updateOverlay() {
          const data = Graph.graphData() || {};
          const nodes = (data.nodes || []).length;
          const links = (data.links || []).length;

          overlay.innerHTML = `
            <div>nodes: <strong>${nodes}</strong>, links: <strong>${links}</strong></div>
          `;
        }

        // refresh periodically for visibility; ties into ui updates
        updateOverlay();
        const intId = setInterval(updateOverlay, 500);

        // update once on graph refresh as well
        const originalRefresh = window.refresh;
        window.refresh = function() {
          const r = originalRefresh.apply(this, arguments);
          updateOverlay();
          return r;
        };

        // expose for debugging if needed
        window._procmap_sim_overlay = { el: overlay, stop: () => clearInterval(intId) };
      })();

      function showDetails(node) {
        const details = q('#details');
        const el = q('#detailsContent');
        const header = `<strong>${node.id} (${node.type})</strong>`;
        const props = node.properties || {};
        let propsHtml = '<div style="margin-top:2px"><strong>Properties</strong><ul>';
        const keys = Object.keys(props);
        if (keys.length === 0) propsHtml += '<li><em>none</em></li>';
        keys.forEach(k => { propsHtml += `<li><strong>${escapeHtml(k)}</strong>: <code>${escapeHtml(JSON.stringify(props[k]))}</code></li>`; });
        propsHtml += '</ul></div>';
        el.innerHTML = header + propsHtml;
        details.hidden = false;
      }

      function hideDetails() {
        q('#details').hidden = true;
      }

      function escapeHtml(s) {
        return s.replace(/[&<>\"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
      }

      function updateGraphData(data){
        console.log('updating graph data:', data.nodes.length, 'nodes,', data.links.length, 'links');

        // merge new data with existing nodes for smoother updates.
        const current = Graph.graphData() || { nodes: [], links: [] };

        // index existing nodes & links
        const existingNodesById = new Map((current.nodes || []).map(n => [n.id, n]));
        const existingLinksByKey = new Map();
        (current.links || []).forEach(l => {
          const src = (typeof l.source === 'object') ? l.source.id : l.source;
          const tgt = (typeof l.target === 'object') ? l.target.id : l.target;
          const key = `${src}::${tgt}`;
          existingLinksByKey.set(key, l);
        });

        // build merged node list reusing objects when possible
        const mergedNodes = [];
        const mergedLinks = [];

        data.nodes.forEach(n => {
          const ex = existingNodesById.get(n.id);
          if (ex) {
            Object.assign(ex, n);
            mergedNodes.push(ex);
          } else {
            console.log('new node', n);
            mergedNodes.push(n);
          }
        });

        data.links.forEach(l => {
          const key = `${l.source}::${l.target}`;
          const ex = existingLinksByKey.get(key);
          if (ex) {
            // FIXME: in existing data source/targets are objects!
            // Object.assign(ex, l);
            mergedLinks.push(ex);
          } else {
            console.log('new link', l);
            mergedLinks.push(l);
          }
        });

        Graph.graphData({ nodes: mergedNodes, links: mergedLinks });
      }

      async function refresh() {
        const data = await loadData();
        // optionally filter out isolated nodes
        const showIsolated = q('#showIsolated').checked;
        if (!showIsolated) {
          const connected = new Set();
          data.links.forEach(l => { connected.add(l.source); connected.add(l.target); });
          data.nodes = data.nodes.filter(n => connected.has(n.id));
        }

        // compute size by degree
        const deg = new Map();

        data.nodes.forEach(n => deg.set(n.id, 0));
        data.links.forEach(l => { deg.set(l.source, (deg.get(l.source) || 0) + 1); deg.set(l.target, (deg.get(l.target) || 0) + 1); });
        data.nodes.forEach(n => n.val = Math.sqrt(Math.max(1, (deg.get(n.id) || 0))));

        updateGraphData(data);
      }

      document.getElementById('refreshBtn').addEventListener('click', refresh);
      document.getElementById('showIsolated').addEventListener('change', refresh);
      document.getElementById('unlockBtn').addEventListener('click', () => {
        const data = Graph.graphData();
        if (!data || !data.nodes) return;
        data.nodes.forEach(n => { n.fx = undefined; n.fy = undefined; });
        Graph.graphData(data);
      });

      // Simulation sliders handlers
      (function wireSimSliders() {
        const elems = {
          charge: q('#chargeRange'),
          chargeVal: q('#chargeVal'),
          linkDist: q('#linkDistRange'),
          linkDistVal: q('#linkDistVal'),
          linkStr: q('#linkStrengthRange'),
          linkStrVal: q('#linkStrVal'),
          collMul: q('#collisionMulRange'),
          collMulVal: q('#collMulVal'),
          alphaT: q('#alphaTargetRange'),
          alphaTVal: q('#alphaTVal'),
          velDecay: q('#velDecayRange'),
          velDecayVal: q('#velDecayVal'),
          linkOpacity: q('#linkOpacityRange'),
          linkOpacityVal: q('#linkOpacityVal'),
        };

        function fmt(v, digits=2){ return (typeof v === 'number') ? Number(v).toFixed(digits) : String(v); }

        function applySimParams() {
          const charge = Number(elems.charge.value);
          const linkDist = Number(elems.linkDist.value);
          const linkStr = Number(elems.linkStr.value);
          const collMul = Number(elems.collMul.value);
          const alphaTarget = Number(elems.alphaT.value);
          const velDecay = Number(elems.velDecay.value);

          // update forces if present
          const chargeForce = Graph.d3Force('charge');
          if (chargeForce && typeof chargeForce.strength === 'function') chargeForce.strength(charge);

          const linkForce = Graph.d3Force('link');
          if (linkForce) {
            if (typeof linkForce.distance === 'function') linkForce.distance(linkDist);
            if (typeof linkForce.strength === 'function') linkForce.strength(linkStr);
          }

          const collisionForce = Graph.d3Force('collision');
          if (collisionForce && typeof collisionForce.radius === 'function') {
            collisionForce.radius(d => (18 + (d.val || 1) * 6) * collMul);
          }

          // velocityDecay and alpha target
          if (typeof Graph.d3VelocityDecay === 'function') Graph.d3VelocityDecay(velDecay);
          if (typeof Graph.d3AlphaTarget === 'function') Graph.d3AlphaTarget(alphaTarget);

          // tiny reheat so changes take effect visibly
          if (typeof Graph.d3Alpha === 'function') {
            Graph.d3Alpha(0.25);
            setTimeout(() => { if (typeof Graph.d3AlphaTarget === 'function') Graph.d3AlphaTarget(0); }, 600);
          }

          // link opacity
          const linkOpacity = Number(elems.linkOpacity.value);
          settings.linkOpacity = linkOpacity;

          // update visual readouts
          elems.chargeVal.textContent = String(charge);
          elems.linkDistVal.textContent = String(linkDist);
          elems.linkStrVal.textContent = fmt(linkStr,2);
          elems.collMulVal.textContent = fmt(collMul,2);
          elems.alphaTVal.textContent = fmt(alphaTarget,2);
          elems.velDecayVal.textContent = fmt(velDecay,2);
          elems.linkOpacityVal.textContent = fmt(linkOpacity,2);
        }

        // attach handlers
        Object.keys(elems).forEach(k => {
          if (!elems[k]) return;
          if (elems[k].tagName === 'INPUT' && elems[k].type === 'range') {
            elems[k].addEventListener('input', applySimParams);
          }
        });

        // apply defaults once
        setTimeout(applySimParams, 0);
      })();

      // initial load
      refresh();
    </script>
  </body>
</html>
