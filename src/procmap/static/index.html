<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>procmap | Process graph</title>
    <style>
      html, body { height: 100%; margin: 0; font-family: 'Ubuntu', 'Segoe UI', 'Arial'; }
      button { font-family: 'Ubuntu', 'Segoe UI', 'Arial'; }
      #controls { position: absolute; top: 8px; left: 8px; z-index: 10; background: rgba(255,255,255,0.9); border-radius: 6px; padding: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.12); }
      #graph { width: 100%; height: 100%; }
      #details { position: absolute; left: 8px; top: 8px; z-index: 10; width: 460px; max-height: 60vh; overflow:auto; background: rgba(255,255,255,0.95); border-radius: 6px; padding: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.12); }
      .muted { color: #666; }
      button { padding: 6px 10px; border-radius: 4px; border: 1px solid #ccc; background: #f5f5f5; cursor: pointer }
      .control-slider-container { display:flex; align-items:center; margin-bottom:2px }
      .control-slider-label { width:48px; text-align:right; margin-left:8px;}
      hr { border: none; border-top: 1px solid rgba(0,0,0,0.08); margin: 6px 0; }
    </style>

    <!-- style tweakpane light theme -->
    <style>
      :root {
        --tp-base-background-color: hsla(230, 5%, 90%, 1.00);
        --tp-base-shadow-color: hsla(0, 0%, 0%, 0.10);
        --tp-button-background-color: hsla(230, 7%, 75%, 1.00);
        --tp-button-background-color-active: hsla(230, 7%, 60%, 1.00);
        --tp-button-background-color-focus: hsla(230, 7%, 65%, 1.00);
        --tp-button-background-color-hover: hsla(230, 7%, 70%, 1.00);
        --tp-button-foreground-color: hsla(230, 10%, 30%, 1.00);
        --tp-container-background-color: hsla(230, 15%, 30%, 0.20);
        --tp-container-background-color-active: hsla(230, 15%, 30%, 0.32);
        --tp-container-background-color-focus: hsla(230, 15%, 30%, 0.28);
        --tp-container-background-color-hover: hsla(230, 15%, 30%, 0.24);
        --tp-container-foreground-color: hsla(230, 10%, 30%, 1.00);
        --tp-groove-foreground-color: hsla(230, 15%, 30%, 0.10);
        --tp-input-background-color: hsla(230, 15%, 30%, 0.10);
        --tp-input-background-color-active: hsla(230, 15%, 30%, 0.22);
        --tp-input-background-color-focus: hsla(230, 15%, 30%, 0.18);
        --tp-input-background-color-hover: hsla(230, 15%, 30%, 0.14);
        --tp-input-foreground-color: hsla(230, 10%, 30%, 1.00);
        --tp-label-foreground-color: hsla(230, 10%, 30%, 0.70);
        --tp-monitor-background-color: hsla(230, 15%, 30%, 0.10);
        --tp-monitor-foreground-color: hsla(230, 10%, 30%, 0.50);
      }
      .tp-rotv {
        font-family: 'Ubuntu', 'Segoe UI', 'Arial', sans-serif !important;
        opacity: 0.9;
      }
    </style>
  </head>
  <body>
    <div id="details" hidden>
      <div id="detailsContent"></div>
    </div>

    <div id="graph"></div>

    <!-- d3 included for convenience; force-graph works with these builds -->
    <script src="https://d3js.org/d3.v6.min.js"></script>
    <script src="https://unpkg.com/force-graph/dist/force-graph.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/json-formatter-js@2.5.23/dist/json-formatter.umd.js"></script>

    <script type="module">
      import { Pane } from 'https://cdn.jsdelivr.net/npm/tweakpane@4.0.5/dist/tweakpane.min.js';

      const settings = {
        d3Charge: -400,
        d3LinkDistance: 140,
        d3LinkStrength: 0.8,
        d3CollisionMultiplier: 1.0,
        d3AlphaTarget: 0.0,
        d3VelocityDecay: 0.80,

        linkOpacity: 0.5,
        showIsolated: true,
      };

      const pane = new Pane({
        title: 'parameters',
      });

      const refreshBtn = pane.addButton({
        title: 'refresh data',
      });
      const unlockBtn = pane.addButton({
          title: 'unlock nodes',
        });

      refreshBtn.on('click', () => {
        refresh();
      });

      unlockBtn.on('click', () => {
        const data = Graph.graphData();
        if (!data || !data.nodes) return;
        data.nodes.forEach(n => { n.fx = undefined; n.fy = undefined; });
        Graph.graphData(data);
      });

      pane.addBinding(settings, 'd3Charge', { min: -800, max: 100, step: 10 }).on('change', ev => {
        applyD3Params();
      });
      pane.addBinding(settings, 'd3LinkDistance', { min: 40, max: 300, step: 5 }).on('change', ev => {
        applyD3Params();
      });
      pane.addBinding(settings, 'd3LinkStrength', { min: 0.0, max: 1.0, step: 0.01 }).on('change', ev => {
        applyD3Params();
      });
      pane.addBinding(settings, 'd3CollisionMultiplier', { min: 0.5, max: 2.0, step: 0.05 }).on('change', ev => {
        applyD3Params();
      });
      pane.addBinding(settings, 'd3AlphaTarget', { min: 0.0, max: 0.5, step: 0.01 }).on('change', ev => {
        applyD3Params();
      });
      pane.addBinding(settings, 'd3VelocityDecay', { min: 0.01, max: 0.99, step: 0.01 }).on('change', ev => {
        applyD3Params();
      });
      pane.addBlade({view: 'separator'});
      pane.addBinding(settings, 'linkOpacity', { min: 0.01, max: 1.00, step: 0.01 });
      pane.addBinding(settings, 'showIsolated').on('change', ev => {
        refresh();
      });

      const q = sel => document.querySelector(sel);

      const NODE_TYPE_COLORS = {
          'process': '#2171ad',  // blue
          'socket': '#e35f44',  // red
          'pipe': '#9e1dde',  // magenta
          'external_ip': '#f58442',  // orange
        };

      const EDGE_TYPE_COLORS = {
        'unix_domain_socket': '#1f78b4', // blue
        'pipe': '#9e1dde',  // magenta
        'socket_connection': '#e35f44',  // red
      };

      function nodeColorFor(node) {
          const type = node.type;
          return NODE_TYPE_COLORS[type] || '#999';
        }

      function edgeColorFor(edge) {
        const type = edge.type;
        return EDGE_TYPE_COLORS[type] || '#999';
      }

      async function loadData() {
        // Fetch generic graph from server
        const res = await fetch('/api/graph');
        if (!res.ok) throw new Error('Failed to fetch /api/graph: ' + res.status);
        const graph = await res.json();

        // Server format: { nodes: [{id, type, properties}], edges: [{source_id, target_id, type, properties}] }
        const nodes = (graph.nodes || []).map(n => ({ id: n.id, type: n.type, properties: n.properties || {}, val: 1 }));
        const links = (graph.edges || []).map(e => ({ source: e.source_id, target: e.target_id, type: e.type, properties: e.properties || {} }));

        return { nodes, links };
      }

      function linkId(link) {
        return `${link.source.id}::${link.target.id}::${link.type}`;
      }

      // returns visited nodes and edges up to maxDepth from startNode
      function bfs(startNode, maxDepth) {
        const visitedNodes = new Set();
        const visitedEdges = new Set();

        const queue = [{ node: startNode, depth: 0 }];
        visitedNodes.add(startNode.id);

        // map from node id to neighboring edges
        const neighborsMap = new Map();
        Graph.graphData().links.forEach(l => {
          const srcId = l.source.id;
          const tgtId = l.target.id;
          if (!neighborsMap.has(srcId)) neighborsMap.set(srcId, []);
          if (!neighborsMap.has(tgtId)) neighborsMap.set(tgtId, []);
          neighborsMap.get(srcId).push(l);
          neighborsMap.get(tgtId).push(l);
        });

        while (queue.length > 0) {
          const { node, depth } = queue.shift();
          if (depth >= maxDepth) continue;
          const neighbors = neighborsMap.get(node.id) || [];
          neighbors.forEach(edge => {
            visitedEdges.add(linkId(edge));
            const neighborNode = (edge.source.id === node.id) ? edge.target : edge.source;
            if (!visitedNodes.has(neighborNode.id)) {
              visitedNodes.add(neighborNode.id);
              queue.push({ node: neighborNode, depth: depth + 1 });
            }
          });
        }

        return {
          visitedNodeIds: visitedNodes,
          visitedEdgeIds: visitedEdges,
        }
      }

      function colorWithAlpha(color, alpha) {
        const col = d3.color(color);
        col.opacity = alpha;
        return col.toString();
      }

      // configure graph
      // Create ForceGraph instance
      const Graph = ForceGraph()(document.getElementById('graph'))
        .nodeId('id')
        .graphData({ nodes: [], links: [] })
        .nodeLabel(n => {
          const name = n.properties && (n.properties.name || n.properties.label);
          const label = name ? name : (n.type ? `${n.type} ${n.id}` : n.id);
          return label + (n.type ? `\n(${n.type})` : '');
        })
        .linkColor(l => {
          const shouldBeWashedOut = settings.highlightLinkIds && !settings.highlightLinkIds.has(linkId(l));

          if (!shouldBeWashedOut) {
            return colorWithAlpha(edgeColorFor(l), settings.linkOpacity);
          } else {
            return colorWithAlpha(edgeColorFor(l), 0.1);
          }
        })
        .linkLabel(l => {
          return l.properties.label || l.type;
        })
        .linkDirectionalParticleColor(l => {
          return colorWithAlpha(edgeColorFor(l), settings.linkOpacity);
        })
        .linkDirectionalParticles(0)
        .linkDirectionalArrowLength(link => {
          if (link.properties && link.properties.directional === false) {
            return 0;
          }
          return 6;
        })
        .linkLineDash(link => {
          if (link.properties && link.properties.dashed === true) {
            return [4,4];
          }
          return null;
        })
        .nodeRelSize(6)
        // custom canvas drawing: keep node size constant on zoom and draw labels scaled nicely
        .nodeCanvasObject((node, ctx, globalScale) => {
          const baseSize = Math.max(4, (node.val || 1) * 3);
          //const r = Math.max(3, baseSize / globalScale); // keep circle size roughly constant on screen
          const r = baseSize;

          const shouldBeWashedOut = settings.highlightNodesIds && !settings.highlightNodesIds.has(node.id);

          // draw filled circle
          ctx.beginPath();

          if (!shouldBeWashedOut) {
            ctx.fillStyle = nodeColorFor(node);
          } else {
            ctx.fillStyle = colorWithAlpha(nodeColorFor(node), 0.1);
          }

          ctx.arc(node.x, node.y, r, 0, 2 * Math.PI, false);
          ctx.fill();

          // draw red outline for locked (pinned) nodes
          const locked = (node.fx !== undefined || node.fy !== undefined);
          if (locked) {
            // stroke width should scale inversely with zoom so it remains visible
            //const strokeWidth = Math.max(1.2, 2 / globalScale);
            const strokeWidth = 2;

            ctx.save();
            ctx.lineWidth = strokeWidth;

            if (!shouldBeWashedOut) {
              ctx.strokeStyle = 'rgba(0,0,0,0.95)';
            } else {
              ctx.strokeStyle = 'rgba(0,0,0,0.2)';
            }

            ctx.beginPath();
            ctx.arc(node.x, node.y, r + strokeWidth / 2, 0, 2 * Math.PI, false);
            ctx.stroke();
            ctx.restore();
          }

          // generic label (use properties.name/label if available, otherwise type + id)
          const name = node.properties && (node.properties.name || node.properties.label);
          const label = name ? name : (node.type ? `${node.type} ${node.id}` : node.id);
          //const fontSize = Math.max(3, 12 / globalScale);
          const fontSize = 12;
          ctx.font = `${fontSize}px Ubuntu, sans-serif`;

          if (shouldBeWashedOut) {
            ctx.fillStyle = 'rgba(0,0,0,0.15)';
          } else {
            ctx.fillStyle = 'rgba(0,0,0,0.75)';
          }

          ctx.fillText(label, node.x + r + 4, node.y + fontSize / 2.8);
        })
        // pointer area for interactions (keeps it reasonably large for hit testing)
        .nodePointerAreaPaint((node, color, ctx) => {
          const r = Math.max(8, (node.val || 1) * 3);
          ctx.fillStyle = color;
          ctx.beginPath();
          ctx.arc(node.x, node.y, r, 0, 2 * Math.PI, false);
          ctx.fill();
        })
        .onNodeClick((node, event) => {
          // Shift/Alt+click to release fixed position, otherwise show details
          if (event && (event.shiftKey || event.altKey)) {
            node.fx = undefined;
            node.fy = undefined;
          } else {
            showDetails(node);
          }
        })
        .onNodeDrag(node => {
          // keep node pinned while dragging
          node.fx = node.x;
          node.fy = node.y;
        })
        .onNodeDragEnd(node => {
          // fix node in place after drag
          node.fx = node.x;
          node.fy = node.y;
        })
        .onNodeHover((node, prevNode) => {
          if (node != null) {
            const visited = bfs(node, 1);

            settings.highlightNodesIds = visited.visitedNodeIds;
            settings.highlightLinkIds = visited.visitedEdgeIds;
          } else {
            settings.highlightNodesIds = null;
            settings.highlightLinkIds = null;
          }
        })
        .onBackgroundClick(() => hideDetails())
        .autoPauseRedraw(false)
        // tune d3 forces to reduce overlaps
        .d3Force('charge', d3.forceManyBody().strength(-450))
        .d3Force('link', d3.forceLink().distance(140).strength(0.8))
        .d3Force('collision', d3.forceCollide().radius(d => 18 + (d.val || 1) * 6).strength(1).iterations(4));

      // export to windows for easy access in devtools
      window.settings = settings;
      window.graph = Graph;

      // keep center updated on resize
      window.addEventListener('resize', () => {
        Graph.d3Force('center', d3.forceCenter(window.innerWidth / 2, window.innerHeight / 2));
      });

      function applyD3Params() {
        //debugger

        const chargeForce = Graph.d3Force('charge');
        if (chargeForce && typeof chargeForce.strength === 'function') chargeForce.strength(settings.d3Charge);

        const linkForce = Graph.d3Force('link');
        if (linkForce) {
          if (typeof linkForce.distance === 'function') linkForce.distance(settings.d3LinkDistance);
          if (typeof linkForce.strength === 'function') linkForce.strength(settings.d3LinkStrength);
        }

        const collisionForce = Graph.d3Force('collision');
        if (collisionForce && typeof collisionForce.radius === 'function') {
          collisionForce.radius(d => (18 + (d.val || 1) * 6) * settings.d3CollisionMultiplier);
        }

        // velocityDecay and alpha target
        if (typeof Graph.d3VelocityDecay === 'function') Graph.d3VelocityDecay(settings.d3VelocityDecay);
        if (typeof Graph.d3AlphaTarget === 'function') Graph.d3AlphaTarget(settings.d3AlphaTarget);

        // tiny reheat so changes take effect visibly
        if (typeof Graph.d3Alpha === 'function') {
          Graph.d3Alpha(0.25);
          setTimeout(() => { if (typeof Graph.d3AlphaTarget === 'function') Graph.d3AlphaTarget(0); }, 600);
        }
      }

      function showDetails(node) {
        const data = {
          id: node.id,
          type: node.type,
          properties: node.properties || {},
        };

        const formatter = new JSONFormatter(data, 2);

        const container = document.getElementById('details');
        while (container.firstChild) {
          container.removeChild(container.firstChild);
        }
        container.appendChild(formatter.render());
        container.hidden = false;
      }

      function hideDetails() {
        q('#details').hidden = true;
      }

      function escapeHtml(s) {
        return s.replace(/[&<>\"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
      }

      function updateGraphData(data){
        console.log('updating graph data:', data.nodes.length, 'nodes,', data.links.length, 'links');

        // merge new data with existing nodes for smoother updates.
        const current = Graph.graphData() || { nodes: [], links: [] };

        // index existing nodes & links
        const existingNodesById = new Map((current.nodes || []).map(n => [n.id, n]));
        const existingLinksByKey = new Map();
        (current.links || []).forEach(l => {
          const src = (typeof l.source === 'object') ? l.source.id : l.source;
          const tgt = (typeof l.target === 'object') ? l.target.id : l.target;
          const key = `${src}::${tgt}`;
          existingLinksByKey.set(key, l);
        });

        // build merged node list reusing objects when possible
        const mergedNodes = [];
        const mergedLinks = [];

        data.nodes.forEach(n => {
          const ex = existingNodesById.get(n.id);
          if (ex) {
            Object.assign(ex, n);
            mergedNodes.push(ex);
          } else {
            //console.log('new node', n);
            mergedNodes.push(n);
          }
        });

        data.links.forEach(l => {
          const key = `${l.source}::${l.target}`;
          const ex = existingLinksByKey.get(key);
          if (ex) {
            // FIXME: in existing data source/targets are objects!
            // Object.assign(ex, l);
            mergedLinks.push(ex);
          } else {
            //console.log('new link', l);
            mergedLinks.push(l);
          }
        });

        Graph.graphData({ nodes: mergedNodes, links: mergedLinks });
      }

      async function refresh() {
        const data = await loadData();
        // optionally filter out isolated nodes
        const showIsolated = settings.showIsolated;
        if (!showIsolated) {
          const connected = new Set();
          data.links.forEach(l => { connected.add(l.source); connected.add(l.target); });
          data.nodes = data.nodes.filter(n => connected.has(n.id));
        }

        // compute size by degree
        const deg = new Map();

        data.nodes.forEach(n => deg.set(n.id, 0));
        data.links.forEach(l => { deg.set(l.source, (deg.get(l.source) || 0) + 1); deg.set(l.target, (deg.get(l.target) || 0) + 1); });
        data.nodes.forEach(n => n.val = Math.sqrt(Math.max(1, (deg.get(n.id) || 0))));

        updateGraphData(data);
      }

      // initial load
      applyD3Params();
      refresh();
    </script>
  </body>
</html>
